model = "gpt-5.5"
service_tier = "fast"
model_reasoning_effort = "high"
#personality = "pragmatic"

[tui]
theme = "dracula"
animations = true
notifications = false
show_tooltips = false
status_line = ["model-with-reasoning", "context-used", "total-input-tokens", "total-output-tokens"]

[feedback]
enabled = false

[features]
codex_hooks = false

[mcp_servers.chrome-devtools]
enabled = false
command = "bunx"
args = ["chrome-devtools-mcp@latest", "--headless", "--viewport=1920x1080"]
default_tools_approval_mode = "approve"

[notice]
hide_rate_limit_model_nudge = true
fast_default_opt_out = true

